        async function executeGuruUpgrade(subscriptionId, offerId, bpIdx) {
            const resultDiv = document.getElementById(`leona-sim-result-${bpIdx}`);
            const btn = document.getElementById(`exec-upgrade-${bpIdx}`);
            if (btn) { btn.disabled = true; btn.textContent = 'Executando upgrade...'; }

            try {
                const res = await fetch('/api/guru-upgrade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ subscription_id: subscriptionId, offer_id: offerId })
                });
                const data = await res.json();

                if (!data.success) {
                    const errMsg = data.error || 'Erro desconhecido';
                    const isNotConfigured = errMsg.toLowerCase().includes('offer') || errMsg.toLowerCase().includes('upgrade') || res.status === 422 || res.status === 400;
                    resultDiv.innerHTML = `
                        <div style="background: var(--bg-primary); padding: 20px; border-radius: 10px; border: 2px solid var(--warning);">
                            <div style="display: grid; gap: 14px;">
                                <div style="color: var(--warning); font-weight: 700; font-size: 1.1rem;">⚠️ Upgrade não disponível</div>
                                <div style="background: rgba(255,193,7,0.1); padding: 14px; border-radius: 8px;">
                                    <div style="color: var(--text-secondary); font-size: 0.9rem;">
                                        ${isNotConfigured
                                            ? 'O plano atual não tem upgrade configurado para este destino na Guru. Configure o upgrade/downgrade na oferta do produto dentro do painel da Guru.'
                                            : errMsg}
                                    </div>
                                </div>
                                ${data.details ? `<details style="color: var(--text-secondary); font-size: 0.75rem;"><summary>Detalhes técnicos</summary><pre style="white-space: pre-wrap; margin-top: 8px;">${JSON.stringify(data.details, null, 2)}</pre></details>` : ''}
                            </div>
                        </div>
                    `;
                    return;
                }

                const inv = data.invoice;
                resultDiv.innerHTML = `
                    <div style="background: var(--bg-primary); padding: 20px; border-radius: 10px; border: 2px solid var(--success);">
                        <div style="display: grid; gap: 14px;">
                            <div style="color: var(--success); font-weight: 700; font-size: 1.1rem;">✅ Upgrade realizado com sucesso!</div>
                            ${inv ? `
                                <div style="background: var(--bg-secondary); padding: 14px; border-radius: 8px;">
                                    <div style="color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 10px; font-weight: 500;">Fatura de upgrade gerada:</div>
                                    <div style="display: flex; justify-content: space-between; font-size: 0.9rem; padding: 8px 0; border-bottom: 1px solid var(--border);">
                                        <span style="color: var(--text-secondary);">Invoice</span>
                                        <span style="font-family: monospace; color: var(--text-primary);">${inv.id}</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; font-size: 0.9rem; padding: 8px 0; border-bottom: 1px solid var(--border);">
                                        <span style="color: var(--text-secondary);">Valor (pro rata)</span>
                                        <span style="color: var(--accent); font-weight: 700; font-size: 1.1rem;">${formatGuruCurrency(inv.value)}</span>
                                    </div>
                                    <div style="display: flex; justify-content: space-between; font-size: 0.9rem; padding: 8px 0;">
                                        <span style="color: var(--text-secondary);">Status</span>
                                        <span style="color: var(--warning);">${inv.status}</span>
                                    </div>
                                </div>
                            ` : `
                                <div style="color: var(--text-secondary); font-size: 0.85rem;">Upgrade executado. A Guru processará a cobrança pro rata.</div>
                            `}
                            <div style="color: var(--text-secondary); font-size: 0.8rem;">O webhook da Guru atualizará as instâncias no Leona automaticamente quando o pagamento for confirmado.</div>
                        </div>
                    </div>
                `;

                showMessage('Upgrade realizado com sucesso na Guru!', 'success');

            } catch (error) {
                resultDiv.innerHTML = `
                    <div style="background: var(--bg-primary); padding: 20px; border-radius: 10px; border: 2px solid var(--error);">
                        <div style="color: var(--error); font-weight: 600;">Erro ao executar upgrade: ${error.message}</div>
                    </div>
                `;
            }
        }

        function copyPixMsg(bpIdx) {
            const msgEl = document.getElementById(`pix-msg-${bpIdx}`);
            const btn = document.getElementById(`copy-pix-msg-${bpIdx}`);
            const text = msgEl.textContent;
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '✓ Copiado!';
                btn.classList.add('copied');
                showMessage('Mensagem copiada!', 'success');
                setTimeout(() => { btn.textContent = 'Copiar Mensagem'; btn.classList.remove('copied'); }, 2000);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent = '✓ Copiado!';
                btn.classList.add('copied');
                showMessage('Mensagem copiada!', 'success');
                setTimeout(() => { btn.textContent = 'Copiar Mensagem'; btn.classList.remove('copied'); }, 2000);
            });
        }

                        </p>
                        <div class="offer-grid">
                            ${offers.map((o, idx) => `
                                <div class="offer-card">
                                    <div>
                                        <div style="font-weight: 600; margin-bottom: 6px;">${o.name}</div>
                                        <div class="offer-value">${formatGuruCurrency(o.value)}<span style="font-size: 0.8rem; font-weight: 400; color: var(--text-secondary);">/mês</span></div>
                                        <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px;">
                                            ${(o.payment_types || []).map(t => t === 'credit_card' ? 'Cartão' : t === 'pix' ? 'PIX' : t).join(' • ')}
                                        </div>
                                    </div>
                                    <button class="btn-copy" id="copy-offer-${idx}" onclick="copyGuruLink('${o.checkout_url + (o.checkout_url.includes("?") ? "&" : "?") + "email=" + email}', 'copy-offer-${idx}')">
                                        Copiar Link
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            section.classList.add('active');
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        
        document.getElementById('emailInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchInvoices();
        });

        document.getElementById('abacateSearchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchAbacatePayments();
        });

        document.getElementById('guruEmailInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchGuru();
        });
    </script>
</body>
</html>
