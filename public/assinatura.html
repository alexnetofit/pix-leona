<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Assinatura - Leona</title>
    <link rel="icon" type="image/png" href="/logo-leona.png">
    <style>
        :root {
            --bg-primary: #0c0a12;
            --bg-secondary: #151120;
            --bg-card: #1e1830;
            --bg-elevated: #261f3a;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --accent-soft: rgba(139, 92, 246, 0.12);
            --orange: #f59e0b;
            --orange-hover: #d97706;
            --orange-soft: rgba(245, 158, 11, 0.12);
            --text-primary: #f0ecf7;
            --text-secondary: #9589ad;
            --text-muted: #6b5f82;
            --error: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --border: #2a2240;
            --border-light: #352d50;
            --glow-purple: rgba(139, 92, 246, 0.25);
            --glow-orange: rgba(245, 158, 11, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 400px;
            background: radial-gradient(ellipse at 50% -20%, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px 60px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-img {
            height: 64px;
            width: auto;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 20px var(--glow-purple));
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.25s ease;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--glow-purple);
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .btn-primary {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            white-space: nowrap;
            transition: all 0.25s ease;
            box-shadow: 0 2px 12px var(--glow-purple);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--accent-hover), var(--accent));
            box-shadow: 0 4px 20px var(--glow-purple);
            transform: translateY(-1px);
        }

        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-orange {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--orange), #fbbf24);
            color: #1a1005;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            white-space: nowrap;
            transition: all 0.25s ease;
            box-shadow: 0 2px 12px var(--glow-orange);
        }

        .btn-orange:hover {
            background: linear-gradient(135deg, var(--orange-hover), var(--orange));
            box-shadow: 0 4px 20px var(--glow-orange);
            transform: translateY(-1px);
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            backdrop-filter: blur(8px);
            transition: border-color 0.25s ease;
        }

        .card:hover { border-color: var(--border-light); }

        .card h3 {
            font-size: 1rem;
            margin-bottom: 16px;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .info-row:last-child { border-bottom: none; }

        .info-label { color: var(--text-secondary); }

        .info-value { font-weight: 600; text-align: right; }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .status-active { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .status-inactive { background: rgba(107, 95, 130, 0.2); color: var(--text-secondary); }
        .status-past_due { background: var(--orange-soft); color: var(--warning); }
        .status-canceled { background: rgba(239, 68, 68, 0.12); color: var(--error); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.7; }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 16px;
            color: var(--error);
            text-align: center;
            font-size: 0.9rem;
        }

        .alert {
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .alert-warning {
            background: var(--orange-soft);
            border: 1px solid rgba(245, 158, 11, 0.25);
            color: var(--orange);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: var(--error);
        }

        .alert-info {
            background: var(--accent-soft);
            border: 1px solid rgba(139, 92, 246, 0.2);
            color: #b49cfa;
        }

        .alert strong { display: block; margin-bottom: 6px; font-size: 1rem; }

        .offer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .offer-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 14px;
            transition: all 0.25s ease;
        }

        .offer-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--glow-purple);
        }

        .offer-card .offer-name { font-weight: 600; font-size: 0.95rem; }

        .offer-card .offer-value {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .offer-card .btn-copy {
            padding: 10px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            text-align: center;
            transition: all 0.25s ease;
        }

        .offer-card .btn-copy:hover { background: linear-gradient(135deg, var(--accent-hover), var(--accent)); }
        .offer-card .btn-copy.copied { background: var(--success); }

        .invoice-card {
            background: var(--bg-card);
            border: 1px solid rgba(245, 158, 11, 0.25);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 12px;
        }

        .sim-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px;
            margin-top: 16px;
        }

        .sim-panel input[type="number"]::-webkit-inner-spin-button,
        .sim-panel input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .sim-panel input[type="number"] {
            -moz-appearance: textfield;
        }

        .sim-result {
            margin-top: 14px;
            display: none;
        }

        a { color: var(--orange); }
        a:hover { color: var(--orange-hover); }

        .footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .footer-logo {
            height: 28px;
            width: auto;
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        .footer-logo:hover { opacity: 0.7; }

        @media (max-width: 600px) {
            .container { padding: 24px 16px 48px; }
            .search-box { flex-direction: column; }
            .info-row { font-size: 0.85rem; }
            .offer-grid { grid-template-columns: 1fr; }
            .logo-img { height: 52px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="/logo-leona.png" alt="Leona" class="logo-img">
            <p class="subtitle">Minha Assinatura</p>
        </header>

        <div id="searchSection" class="search-box" style="display: none;">
            <input type="email" id="emailInput" placeholder="Digite seu e-mail" onkeydown="if(event.key==='Enter')loadProfile()">
            <button class="btn-primary" onclick="loadProfile()">Buscar</button>
        </div>

        <div id="content"></div>

        <div class="footer">
            <img src="/logo-leona.png" alt="Leona" class="footer-logo">
        </div>
    </div>

    <script>
        let _data = null;
        let _email = '';

        function getEmail() {
            const params = new URLSearchParams(window.location.search);
            return (params.get('email') || '').trim().toLowerCase();
        }

        function formatDate(d) {
            if (!d) return '—';
            const date = new Date(d.includes('T') ? d : d + 'T00:00:00Z');
            return date.toLocaleDateString('pt-BR', { timeZone: 'UTC' });
        }

        function fmtCurrency(v) {
            if (v == null) return '—';
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        }

        function statusLabel(s) {
            const map = { active: 'Ativa', inactive: 'Inativa', past_due: 'Atrasada', canceled: 'Cancelada', trialing: 'Trial' };
            return map[s] || s || '—';
        }

        function statusClass(s) {
            if (s === 'active' || s === 'trialing') return 'status-active';
            if (s === 'past_due') return 'status-past_due';
            if (s === 'canceled') return 'status-canceled';
            return 'status-inactive';
        }

        function invoiceStatusLabel(s) {
            const map = { paid: 'Pago', pending: 'Pendente', waiting_payment: 'Aguardando pagamento', overdue: 'Em atraso', refunded: 'Reembolsado' };
            return map[s] || s;
        }

        function getOfferForQty(offers, qty) {
            if (!offers) return null;
            for (const o of offers) {
                const m = o.name.match(/(\d+)\s*conex/i);
                if (m && parseInt(m[1]) === qty) return o;
            }
            return null;
        }

        function calcProRata(currentValue, newValue, periodEndStr) {
            const now = new Date();
            const periodEnd = new Date(periodEndStr);
            const diffMs = periodEnd.getTime() - now.getTime();
            const diasRestantes = Math.max(0, Math.ceil(diffMs / 86400000));
            const diasNoCiclo = 30;
            const proRata = (newValue - currentValue) * diasRestantes / diasNoCiclo;
            return { proRata: Math.round(proRata * 100) / 100, diasRestantes, diasNoCiclo };
        }

        function adjustQty(idx, delta) {
            const input = document.getElementById(`newQty-${idx}`);
            const val = parseInt(input.value) || 1;
            const newVal = Math.max(1, val + delta);
            input.value = newVal;
            const profiles = _data?.leona?.billing_profiles || (_data?.leona?.billing_profile ? [_data.leona.billing_profile] : []);
            const currentQty = profiles[idx]?.starter_instances || 0;
            updateQtyLabel(idx, currentQty);
        }

        function updateQtyLabel(idx, currentQty) {
            const input = document.getElementById(`newQty-${idx}`);
            const label = document.getElementById(`qtyLabel-${idx}`);
            const btn = document.getElementById(`simBtn-${idx}`);
            const newQty = parseInt(input.value) || 0;
            const diff = newQty - currentQty;

            if (diff === 0) {
                label.innerHTML = `<span style="color: var(--text-muted);">Igual ao plano atual</span>`;
                btn.disabled = true;
                btn.textContent = 'Simular alteração';
            } else if (diff > 0) {
                label.innerHTML = `<span style="color: var(--success);">+${diff} conex${diff !== 1 ? 'ões' : 'ão'}</span><span style="color: var(--text-muted);"> · total: <strong style="color: var(--text-primary);">${newQty}</strong></span>`;
                btn.disabled = false;
                btn.textContent = `Simular upgrade para ${newQty} conexões`;
            } else {
                const absDiff = Math.abs(diff);
                label.innerHTML = `<span style="color: var(--orange);">−${absDiff} conex${absDiff !== 1 ? 'ões' : 'ão'}</span><span style="color: var(--text-muted);"> · total: <strong style="color: var(--text-primary);">${newQty}</strong></span>`;
                btn.disabled = false;
                btn.textContent = `Simular downgrade para ${newQty} conex${newQty !== 1 ? 'ões' : 'ão'}`;
            }
        }

        function isLeonaExpired(bp) {
            if (!bp.subscription_status || bp.subscription_status !== 'active') return true;
            if (bp.current_period_end && new Date(bp.current_period_end) <= new Date()) return true;
            return false;
        }

        function copyLink(text, btnId) {
            const btn = document.getElementById(btnId);
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '✓ Copiado!';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = 'Copiar Link'; btn.classList.remove('copied'); }, 2000);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent = '✓ Copiado!';
            });
        }

        async function loadProfile() {
            let email = getEmail();
            if (!email) {
                const input = document.getElementById('emailInput');
                email = (input.value || '').trim().toLowerCase();
            }
            if (!email) return;
            _email = email;

            const content = document.getElementById('content');
            content.innerHTML = `<div class="loading-state"><div class="spinner"></div><p style="color: var(--text-secondary); margin-top: 16px;">Carregando dados...</p></div>`;

            try {
                const res = await fetch('/api/guru-search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (!res.ok) {
                    content.innerHTML = `<div class="error-msg">${data.error || 'Erro ao buscar dados'}</div>`;
                    return;
                }

                _data = data;
                renderProfile(data, email);
            } catch (err) {
                content.innerHTML = `<div class="error-msg">Erro de conexão: ${err.message}</div>`;
            }
        }

        function renderProfileCard(bp, idx, total) {
            const active = !isLeonaExpired(bp);
            return `
                <div class="card" style="${active ? 'border-color: var(--accent); box-shadow: 0 0 20px var(--glow-purple);' : 'border-color: var(--error);'}">
                    <h3>Assinatura${total > 1 ? ` #${idx + 1}` : ''}</h3>
                    <div>
                        ${bp.user?.name ? `<div class="info-row"><span class="info-label">Nome</span><span class="info-value">${bp.user.name}</span></div>` : ''}
                        ${bp.user?.email ? `<div class="info-row"><span class="info-label">Email</span><span class="info-value">${bp.user.email}</span></div>` : ''}
                        ${bp.user?.phone ? `<div class="info-row"><span class="info-label">Telefone</span><span class="info-value">${bp.user.phone}</span></div>` : ''}
                        ${bp.plan_summary ? `<div class="info-row"><span class="info-label">Plano</span><span class="info-value">${bp.plan_summary}</span></div>` : ''}
                        ${bp.starter_instances != null ? `<div class="info-row"><span class="info-label">Conexões Starter</span><span class="info-value">${bp.starter_instances}</span></div>` : ''}
                        ${bp.pro_instances != null && bp.pro_instances > 0 ? `<div class="info-row"><span class="info-label">Conexões Pro</span><span class="info-value">${bp.pro_instances}</span></div>` : ''}
                        ${bp.subscription_status ? `<div class="info-row"><span class="info-label">Status</span><span class="info-value"><span class="status-badge ${statusClass(bp.subscription_status)}">${statusLabel(bp.subscription_status)}</span></span></div>` : ''}
                        ${bp.current_period_end ? `<div class="info-row"><span class="info-label">${active ? 'Próxima renovação' : 'Venceu em'}</span><span class="info-value">${formatDate(bp.current_period_end)}</span></div>` : ''}
                    </div>
                </div>
            `;
        }

        function renderOffersGrid(offers, email) {
            if (!offers || offers.length === 0) return '';
            return `
                <div class="card">
                    <h3>Escolha um plano</h3>
                    <p style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 4px;">Selecione o plano ideal e assine agora:</p>
                    <div class="offer-grid">
                        ${offers.map((o, i) => {
                            const url = o.checkout_url ? o.checkout_url + (o.checkout_url.includes('?') ? '&' : '?') + 'email=' + email : '';
                            return `
                                <div class="offer-card">
                                    <div>
                                        <div class="offer-name">${o.name}</div>
                                        <div class="offer-value">${fmtCurrency(o.value)}<span style="font-size: 0.75rem; font-weight: 400; color: var(--text-secondary);">/mês</span></div>
                                        <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px;">
                                            ${(o.payment_types || []).map(t => t === 'credit_card' ? 'Cartão' : t === 'pix' ? 'PIX' : t).join(' · ')}
                                        </div>
                                    </div>
                                    ${url ? `<button class="btn-copy" id="copy-of-${i}" onclick="copyLink('${url}', 'copy-of-${i}')">Copiar Link</button>` : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function renderOpenInvoices(invoices) {
            const open = (invoices || []).filter(inv => inv.status !== 'paid' && inv.status !== 'refunded');
            if (open.length === 0) return null;
            return `
                <div class="card">
                    <h3>Faturas em aberto</h3>
                    ${open.map(inv => `
                        <div class="invoice-card">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px;">
                                <div>
                                    <div style="font-weight: 600;">${inv.offer_name || inv.product_name || 'Fatura'}</div>
                                    <div style="font-family: monospace; font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px;">${inv.id}</div>
                                </div>
                                <div style="text-align: right;">
                                    <div style="font-size: 1.2rem; font-weight: 700; color: var(--orange);">${fmtCurrency(inv.value)}</div>
                                    <div style="font-size: 0.8rem; color: var(--warning);">${invoiceStatusLabel(inv.status)}</div>
                                    ${inv.charge_at ? `<div style="font-size: 0.75rem; color: var(--text-secondary);">Vence: ${formatDate(inv.charge_at)}</div>` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                    <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 8px;">Realize o pagamento da fatura acima para reativar sua assinatura.</p>
                </div>
            `;
        }

        function findPendingInvoice(guru) {
            if (!guru.found || !guru.subscriptions) return null;
            for (const sub of guru.subscriptions) {
                const inv = sub.current_invoice;
                if (inv && (inv.status === 'waiting_payment' || inv.status === 'pending')) {
                    return inv;
                }
            }
            return null;
        }

        function renderPendingInvoice(inv) {
            const typeLabel = inv.type === 'upgrade' ? 'Upgrade' : inv.type === 'downgrade' ? 'Downgrade' : 'Fatura';
            return `
                <div style="background: var(--bg-card); padding: 20px; border-radius: 14px; border: 1px solid rgba(245,158,11,0.3); margin-bottom: 16px; box-shadow: 0 0 20px var(--glow-orange);">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 14px;">
                        <span style="color: var(--orange); font-size: 1.2rem;">⚠️</span>
                        <strong style="color: var(--orange);">${typeLabel} pendente de pagamento</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span style="color: var(--text-secondary);">Valor:</span>
                        <span style="font-weight: 700; color: var(--orange);">R$ ${Number(inv.value).toFixed(2)}</span>
                    </div>
                    ${inv.payment_url ? `
                        <div style="margin-top: 14px;">
                            <div style="display: flex; gap: 8px;">
                                <input type="text" value="${inv.payment_url}" readonly
                                    style="flex: 1; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text-primary); font-size: 0.85rem; font-family: monospace;"
                                    id="paymentUrl-${inv.id}" onclick="this.select()">
                                <button class="btn-orange" style="padding: 10px 16px; font-size: 0.85rem; white-space: nowrap;"
                                    onclick="navigator.clipboard.writeText('${inv.payment_url}').then(() => { this.textContent = 'Copiado!'; setTimeout(() => this.textContent = 'Copiar', 2000); })">
                                    Copiar
                                </button>
                            </div>
                            <a href="${inv.payment_url}" target="_blank" style="display: inline-block; margin-top: 10px; color: var(--orange); font-size: 0.85rem; text-decoration: none; font-weight: 500;">Abrir link de pagamento →</a>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderUpgradePanel(bp, idx) {
            const currentQty = bp.starter_instances || 0;
            return `
                <div class="sim-panel">
                    <h3 style="color: var(--orange); font-size: 1rem; margin-bottom: 16px;">Alterar plano</h3>

                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
                        <span style="color: var(--text-secondary); font-size: 0.85rem;">Plano atual</span>
                        <span style="color: var(--text-primary); font-weight: 700; font-size: 1.1rem;">${currentQty} conex${currentQty !== 1 ? 'ões' : 'ão'}</span>
                    </div>

                    <div style="border-top: 1px solid var(--border); padding-top: 16px; margin-top: 8px;">
                        <span style="color: var(--text-secondary); font-size: 0.85rem; display: block; margin-bottom: 12px;">Novo total de conexões:</span>
                        <div style="display: flex; align-items: center; justify-content: center; gap: 16px;">
                            <button onclick="adjustQty(${idx}, -1)" style="width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); font-size: 1.4rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-primary)'">−</button>
                            <div style="text-align: center; min-width: 80px;">
                                <input type="number" id="newQty-${idx}" value="${currentQty}" min="1"
                                    style="width: 64px; padding: 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary); font-size: 1.3rem; font-weight: 700; text-align: center; outline: none; transition: all 0.25s;"
                                    onfocus="this.style.borderColor='var(--accent)';this.style.boxShadow='0 0 0 3px var(--glow-purple)'"
                                    onblur="this.style.borderColor='var(--border)';this.style.boxShadow='none'"
                                    oninput="updateQtyLabel(${idx}, ${currentQty})">
                            </div>
                            <button onclick="adjustQty(${idx}, +1)" style="width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); font-size: 1.4rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;" onmouseover="this.style.borderColor='var(--orange)';this.style.color='var(--orange)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-primary)'">+</button>
                        </div>
                        <div id="qtyLabel-${idx}" style="text-align: center; margin-top: 12px; font-size: 0.85rem; min-height: 22px; transition: all 0.2s;"></div>
                    </div>

                    <button class="btn-orange" style="width: 100%; padding: 14px; margin-top: 16px; font-size: 0.95rem;" onclick="simulateChange(${idx})" id="simBtn-${idx}" disabled>
                        Simular alteração
                    </button>

                    <div class="sim-result" id="simResult-${idx}"></div>
                </div>
            `;
        }

        function renderProfile(data, email) {
            const content = document.getElementById('content');
            const { leona, guru, offers } = data;

            const profiles = leona.billing_profiles || (leona.billing_profile ? [leona.billing_profile] : []);

            if (!leona.found || profiles.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <p>Nenhuma assinatura encontrada para <strong>${email}</strong>.</p>
                    </div>
                    ${renderOffersGrid(offers, email)}
                `;
                return;
            }

            const hasGuruActive = guru.found && guru.subscriptions.some(s => s.status === 'active');
            const hasGuruAny = guru.found && guru.subscriptions.length > 0;

            let html = '';

            for (let i = 0; i < profiles.length; i++) {
                const bp = profiles[i];
                const expired = isLeonaExpired(bp);

                html += renderProfileCard(bp, i, profiles.length);

                if (expired) {
                    if (hasGuruActive) {
                        // Cenário 3: Leona vencida + Guru ativa
                        html += `
                            <div class="alert alert-warning">
                                <strong>Inconsistência detectada</strong>
                                Identificamos que seu pagamento está em dia, mas sua conta Leona está inativa.
                                Por favor, entre em contato com o suporte para regularizar sua situação.
                                <div style="margin-top: 12px;">
                                    <a href="https://wa.me/5511999999999" target="_blank" style="color: var(--orange); font-weight: 600; text-decoration: none;">Falar com o suporte →</a>
                                </div>
                            </div>
                        `;
                    } else if (hasGuruAny) {
                        // Cenário 2: Leona vencida + Guru vencida/cancelada
                        const invoicesHtml = renderOpenInvoices(guru.invoices);
                        if (invoicesHtml) {
                            html += invoicesHtml;
                        } else {
                            html += `
                                <div class="alert alert-error">
                                    <strong>Assinatura vencida</strong>
                                    Não há faturas pendentes de pagamento. Escolha um plano abaixo para reativar sua assinatura.
                                </div>
                            `;
                            html += renderOffersGrid(offers, email);
                        }
                    } else {
                        // Cenário 1: Leona vencida + sem Guru
                        html += `
                            <div class="alert alert-error">
                                <strong>Assinatura vencida</strong>
                                Escolha um plano abaixo para reativar sua assinatura.
                            </div>
                        `;
                        html += renderOffersGrid(offers, email);
                    }
                } else {
                    // Cenário 4: Leona ativa — upgrade/downgrade
                    const pendingInvoice = findPendingInvoice(guru);
                    if (pendingInvoice) {
                        html += renderPendingInvoice(pendingInvoice);
                    }
                    html += `
                        <div class="alert alert-info">
                            <strong>Assinatura ativa</strong>
                            Sua assinatura está em dia. Você pode alterar seu plano abaixo.
                        </div>
                    `;
                    html += renderUpgradePanel(bp, i);
                }
            }

            content.innerHTML = html;
        }

        async function simulateChange(bpIdx) {
            const data = _data;
            const email = _email;
            if (!data) return;

            const profiles = data.leona.billing_profiles || (data.leona.billing_profile ? [data.leona.billing_profile] : []);
            const bp = profiles[bpIdx];
            if (!bp) return;

            const input = document.getElementById(`newQty-${bpIdx}`);
            const resultDiv = document.getElementById(`simResult-${bpIdx}`);
            const newQty = parseInt(input.value);
            const currentQty = bp.starter_instances || 0;

            if (!newQty || newQty < 1) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<div class="alert alert-error">Informe pelo menos 1 conexão.</div>`;
                return;
            }
            if (newQty === currentQty) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<div class="alert alert-warning">A quantidade é igual à atual (${currentQty}).</div>`;
                return;
            }

            const offers = data.offers || [];
            const currentOffer = getOfferForQty(offers, currentQty);
            const newOffer = getOfferForQty(offers, newQty);

            if (!newOffer) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<div class="alert alert-warning">Não existe plano configurado para ${newQty} conex${newQty !== 1 ? 'ões' : 'ão'}.</div>`;
                return;
            }

            const currentValue = currentOffer ? currentOffer.value : 0;
            const newValue = newOffer.value;
            const isUpgrade = newQty > currentQty;
            const diff = Math.abs(newQty - currentQty);
            const hasGuru = data.guru.found && data.guru.subscriptions.length > 0;
            const periodEnd = bp.current_period_end;

            resultDiv.style.display = 'block';

            if (!isUpgrade) {
                resultDiv.innerHTML = `
                    <div style="background: var(--bg-card); padding: 20px; border-radius: 14px; border: 1px solid rgba(245,158,11,0.3);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                            <span style="color: var(--text-secondary);">Alteração:</span>
                            <span style="color: var(--orange); font-weight: 700;">⬇️ DOWNGRADE (-${diff})</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span style="color: var(--text-secondary);">Conexões:</span>
                            <span style="font-weight: 600;">${currentQty} → ${newQty}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                            <span style="color: var(--text-secondary);">Valor mensal:</span>
                            <span style="font-weight: 600;">${fmtCurrency(currentValue)} → ${fmtCurrency(newValue)}</span>
                        </div>
                        <div style="background: var(--orange-soft); padding: 12px; border-radius: 10px; color: var(--orange); font-size: 0.85rem; text-align: center;">
                            O downgrade será aplicado na próxima renovação. Sem cobrança adicional.
                        </div>
                    </div>
                `;
                return;
            }

            if (!periodEnd || new Date(periodEnd) <= new Date()) {
                resultDiv.innerHTML = `<div class="alert alert-warning">Ciclo vencido. Não é possível calcular pro rata.</div>`;
                return;
            }

            const { proRata, diasRestantes, diasNoCiclo } = calcProRata(currentValue, newValue, periodEnd);

            if (hasGuru) {
                const activeSub = data.guru.subscriptions.find(s => s.status === 'active') || data.guru.subscriptions[0];
                const subId = activeSub?.id;

                resultDiv.innerHTML = `
                    <div style="background: var(--bg-card); padding: 20px; border-radius: 14px; border: 1px solid rgba(16,185,129,0.3);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                            <span style="color: var(--text-secondary);">Alteração:</span>
                            <span style="color: var(--success); font-weight: 700;">⬆️ UPGRADE (+${diff})</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span style="color: var(--text-secondary);">Conexões:</span>
                            <span style="font-weight: 600;">${currentQty} → ${newQty}</span>
                        </div>
                        <div style="background: var(--bg-secondary); padding: 14px; border-radius: 10px; margin-bottom: 14px;">
                            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px;">Estimativa pro rata:</div>
                            <div style="display: flex; justify-content: space-between; font-size: 0.85rem; padding: 6px 0; border-bottom: 1px solid var(--border);">
                                <span style="color: var(--text-secondary);">Crédito (${currentQty}x, ${diasRestantes}d)</span>
                                <span style="color: var(--error);">-${fmtCurrency(currentValue * diasRestantes / diasNoCiclo)}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; font-size: 0.85rem; padding: 6px 0; border-bottom: 1px solid var(--border);">
                                <span style="color: var(--text-secondary);">Cobrança (${newQty}x, ${diasRestantes}d)</span>
                                <span style="color: var(--success);">+${fmtCurrency(newValue * diasRestantes / diasNoCiclo)}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; font-size: 1rem; padding-top: 8px;">
                                <span style="font-weight: 600;">Pro rata estimado:</span>
                                <span style="color: var(--orange); font-weight: 700;">${fmtCurrency(proRata)}</span>
                            </div>
                            <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; font-style: italic;">Valor exato calculado pela Guru na execução.</div>
                        </div>
                        <button class="btn-orange" id="execUpgrade-${bpIdx}" onclick="executeGuruUpgrade('${subId}', '${newOffer.id}', ${bpIdx})" style="width: 100%; padding: 14px;">
                            Executar Upgrade para ${newOffer.name}
                        </button>
                    </div>
                `;
            } else {
                const discountPct = newValue > 0 ? (1 - proRata / newValue) * 100 : 0;
                let couponPct = Math.round(discountPct / 5) * 5;
                couponPct = Math.max(5, Math.min(95, couponPct));
                const couponCode = `up-leona-${couponPct}`;
                const couponDiscount = newValue * couponPct / 100;

                resultDiv.innerHTML = `
                    <div style="background: var(--bg-card); padding: 18px; border-radius: 10px; border: 1px solid var(--success);">
                        <div style="text-align: center; padding: 12px; color: var(--text-secondary);">
                            <div class="spinner"></div>
                            <div style="margin-top: 8px;">Preparando cupom...</div>
                        </div>
                    </div>
                `;

                let couponOk = false;
                try {
                    const addRes = await fetch('/api/guru-coupons', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'add_email', coupon_code: couponCode, email })
                    });
                    const addData = await addRes.json();
                    couponOk = addData.success;
                } catch (_) {}

                const baseUrl = newOffer.checkout_url || '';
                const checkoutUrl = baseUrl ? baseUrl + (baseUrl.includes('?') ? '&' : '?') + 'coupon=' + couponCode + '&email=' + email : '';

                resultDiv.innerHTML = `
                    <div style="background: var(--bg-card); padding: 20px; border-radius: 14px; border: 1px solid rgba(16,185,129,0.3);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                            <span style="color: var(--text-secondary);">Alteração:</span>
                            <span style="color: var(--success); font-weight: 700;">⬆️ UPGRADE (+${diff})</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span style="color: var(--text-secondary);">Conexões:</span>
                            <span style="font-weight: 600;">${currentQty} → ${newQty}</span>
                        </div>
                        <div style="background: var(--bg-secondary); padding: 14px; border-radius: 10px; margin-bottom: 14px;">
                            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px;">Cálculo pro rata:</div>
                            <div style="display: flex; justify-content: space-between; font-size: 0.85rem; padding: 6px 0; border-bottom: 1px solid var(--border);">
                                <span style="color: var(--text-secondary);">Crédito (${currentQty}x, ${diasRestantes}d)</span>
                                <span style="color: var(--error);">-${fmtCurrency(currentValue * diasRestantes / diasNoCiclo)}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; font-size: 0.85rem; padding: 6px 0; border-bottom: 1px solid var(--border);">
                                <span style="color: var(--text-secondary);">Cobrança (${newQty}x, ${diasRestantes}d)</span>
                                <span style="color: var(--success);">+${fmtCurrency(newValue * diasRestantes / diasNoCiclo)}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; font-size: 1rem; padding-top: 8px;">
                                <span style="font-weight: 600;">Pro rata:</span>
                                <span style="color: var(--orange); font-weight: 700;">${fmtCurrency(proRata)}</span>
                            </div>
                        </div>
                        <div style="background: var(--accent-soft); padding: 14px; border-radius: 10px; margin-bottom: 14px;">
                            <div style="display: flex; justify-content: space-between;">
                                <span style="color: var(--accent);">Cupom: <strong>${couponCode}</strong> (${couponPct}% off)</span>
                                <span style="color: var(--accent); font-weight: 600;">${fmtCurrency(couponDiscount)}</span>
                            </div>
                            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;">
                                Pagará ${fmtCurrency(newValue - couponDiscount)} na 1ª fatura, depois ${fmtCurrency(newValue)}/mês
                            </div>
                        </div>
                        ${checkoutUrl ? `
                            <div style="background: var(--orange-soft); padding: 16px; border-radius: 10px;">
                                <div style="color: var(--orange); font-weight: 600; margin-bottom: 10px;">Link de checkout com desconto</div>
                                <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                                    <button class="btn-orange" id="copy-up-${bpIdx}" onclick="copyLink('${checkoutUrl}', 'copy-up-${bpIdx}')" style="width: auto; padding: 10px 16px; font-size: 0.85rem;">Copiar Link</button>
                                    <span style="font-size: 0.7rem; color: var(--text-muted); font-family: monospace; word-break: break-all;">${checkoutUrl}</span>
                                </div>
                            </div>
                        ` : ''}
                        ${!couponOk ? `<div style="margin-top: 8px; font-size: 0.8rem; color: var(--orange);">⚠️ Não foi possível adicionar o email ao cupom automaticamente.</div>` : ''}
                    </div>
                `;
            }
        }

        async function executeGuruUpgrade(subscriptionId, offerId, bpIdx) {
            const resultDiv = document.getElementById(`simResult-${bpIdx}`);
            const btn = document.getElementById(`execUpgrade-${bpIdx}`);
            if (btn) { btn.disabled = true; btn.textContent = 'Executando...'; }

            try {
                const res = await fetch('/api/guru-upgrade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ subscription_id: subscriptionId, offer_id: offerId })
                });
                const data = await res.json();

                if (!data.success) {
                    const errMsg = data.error || 'Erro desconhecido';
                    resultDiv.innerHTML = `
                        <div class="alert alert-warning">
                            <strong>Upgrade não disponível</strong>
                            ${errMsg.toLowerCase().includes('offer') || res.status === 422 || res.status === 400
                                ? 'O plano atual não tem upgrade configurado para este destino. Entre em contato com o suporte.'
                                : errMsg}
                            ${data.details ? `<details style="margin-top: 8px; font-size: 0.75rem;"><summary>Detalhes</summary><pre style="white-space: pre-wrap; margin-top: 4px;">${JSON.stringify(data.details, null, 2)}</pre></details>` : ''}
                        </div>
                    `;
                    return;
                }

                const inv = data.invoice;
                resultDiv.innerHTML = `
                    <div style="background: var(--bg-card); padding: 20px; border-radius: 14px; border: 1px solid rgba(16,185,129,0.3); box-shadow: 0 0 20px rgba(16,185,129,0.1);">
                        <div style="color: var(--success); font-weight: 700; margin-bottom: 14px; font-size: 1.05rem;">✅ Upgrade realizado!</div>
                        ${inv ? `
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span style="color: var(--text-secondary);">Fatura</span>
                                <span style="font-family: monospace; font-size: 0.85rem;">${inv.id}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span style="color: var(--text-secondary);">Valor pro rata</span>
                                <span style="color: var(--orange); font-weight: 700;">${fmtCurrency(inv.value)}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between;">
                                <span style="color: var(--text-secondary);">Status</span>
                                <span style="color: var(--orange);">${invoiceStatusLabel(inv.status)}</span>
                            </div>
                            ${inv.payment_url ? `
                                <div style="margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);">
                                    <span style="color: var(--text-secondary); font-size: 0.85rem; display: block; margin-bottom: 8px;">Link de pagamento:</span>
                                    <div style="display: flex; gap: 8px;">
                                        <input type="text" value="${inv.payment_url}" readonly
                                            style="flex: 1; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text-primary); font-size: 0.8rem; font-family: monospace;"
                                            onclick="this.select()">
                                        <button class="btn-orange" style="padding: 10px 16px; font-size: 0.85rem; white-space: nowrap;"
                                            onclick="navigator.clipboard.writeText('${inv.payment_url}').then(() => { this.textContent = 'Copiado!'; setTimeout(() => this.textContent = 'Copiar', 2000); })">
                                            Copiar
                                        </button>
                                    </div>
                                    <a href="${inv.payment_url}" target="_blank" style="display: inline-block; margin-top: 10px; color: var(--orange); font-size: 0.85rem; text-decoration: none; font-weight: 500;">Abrir link de pagamento →</a>
                                </div>
                            ` : ''}
                        ` : '<p style="color: var(--text-secondary); font-size: 0.85rem;">Upgrade processado. A cobrança será feita automaticamente.</p>'}
                        <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 14px;">Suas conexões serão atualizadas após a confirmação do pagamento.</p>
                    </div>
                `;
            } catch (err) {
                resultDiv.innerHTML = `<div class="alert alert-error">Erro: ${err.message}</div>`;
            }
        }

        // Init
        const emailParam = getEmail();
        if (emailParam) {
            loadProfile();
        } else {
            document.getElementById('searchSection').style.display = 'flex';
        }
    </script>
</body>
</html>
