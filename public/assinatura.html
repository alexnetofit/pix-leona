<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Assinatura - Leona Flow</title>
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-card: #242424;
            --accent: #00d4aa;
            --accent-hover: #00b894;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --error: #ff6b6b;
            --success: #00d4aa;
            --warning: #ffc107;
            --border: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @font-face {
            font-family: 'Geist';
            src: local('Geist'), local('SF Pro Display');
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #00e6b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .btn-primary {
            padding: 14px 24px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: var(--accent);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .info-row:last-child { border-bottom: none; }

        .info-label { color: var(--text-secondary); }

        .info-value { font-weight: 600; text-align: right; }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-active { background: rgba(0, 212, 170, 0.15); color: var(--success); }
        .status-inactive { background: rgba(160, 160, 160, 0.15); color: var(--text-secondary); }
        .status-past_due { background: rgba(255, 193, 7, 0.15); color: var(--warning); }
        .status-canceled { background: rgba(255, 107, 107, 0.15); color: var(--error); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
        }

        .error-msg {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--error);
            border-radius: 10px;
            padding: 14px;
            color: var(--error);
            text-align: center;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .container { padding: 24px 16px; }
            .search-box { flex-direction: column; }
            .info-row { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">Leona Flow</h1>
            <p class="subtitle">Minha Assinatura</p>
        </header>

        <div id="searchSection" class="search-box" style="display: none;">
            <input type="email" id="emailInput" placeholder="Digite seu e-mail" onkeydown="if(event.key==='Enter')loadProfile()">
            <button class="btn-primary" onclick="loadProfile()">Buscar</button>
        </div>

        <div id="content"></div>
    </div>

    <script>
        function getEmail() {
            const params = new URLSearchParams(window.location.search);
            return (params.get('email') || '').trim().toLowerCase();
        }

        function formatDate(d) {
            if (!d) return '—';
            const date = new Date(d.includes('T') ? d : d + 'T00:00:00Z');
            return date.toLocaleDateString('pt-BR', { timeZone: 'UTC' });
        }

        function formatCurrency(v) {
            if (v == null) return '—';
            return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function statusLabel(s) {
            const map = { active: 'Ativa', inactive: 'Inativa', past_due: 'Atrasada', canceled: 'Cancelada', trialing: 'Trial' };
            return map[s] || s || '—';
        }

        function statusClass(s) {
            if (s === 'active' || s === 'trialing') return 'status-active';
            if (s === 'past_due') return 'status-past_due';
            if (s === 'canceled') return 'status-canceled';
            return 'status-inactive';
        }

        async function loadProfile() {
            let email = getEmail();
            if (!email) {
                const input = document.getElementById('emailInput');
                email = (input.value || '').trim().toLowerCase();
            }
            if (!email) return;

            const content = document.getElementById('content');
            content.innerHTML = `<div class="loading-state"><div class="spinner"></div><p style="color: var(--text-secondary); margin-top: 16px;">Carregando dados...</p></div>`;

            try {
                const res = await fetch('/api/guru-search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (!res.ok) {
                    content.innerHTML = `<div class="error-msg">${data.error || 'Erro ao buscar dados'}</div>`;
                    return;
                }

                renderProfile(data, email);
            } catch (err) {
                content.innerHTML = `<div class="error-msg">Erro de conexão: ${err.message}</div>`;
            }
        }

        function renderProfile(data, email) {
            const content = document.getElementById('content');
            const { leona, guru } = data;

            const profiles = leona.billing_profiles || (leona.billing_profile ? [leona.billing_profile] : []);

            if (!leona.found || profiles.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <p>Nenhuma assinatura encontrada para <strong>${email}</strong>.</p>
                    </div>
                `;
                return;
            }

            let html = '';

            for (const bp of profiles) {
                const isActive = bp.subscription_status === 'active' && bp.current_period_end && new Date(bp.current_period_end) > new Date();

                html += `
                    <div class="card" style="${isActive ? 'border-color: var(--accent);' : ''}">
                        <h3>Assinatura${profiles.length > 1 ? ` — ${bp.account_id || ''}` : ''}</h3>
                        <div>
                            ${bp.user?.name ? `<div class="info-row"><span class="info-label">Nome</span><span class="info-value">${bp.user.name}</span></div>` : ''}
                            ${bp.user?.email ? `<div class="info-row"><span class="info-label">Email</span><span class="info-value">${bp.user.email}</span></div>` : ''}
                            ${bp.plan_summary ? `<div class="info-row"><span class="info-label">Plano</span><span class="info-value">${bp.plan_summary}</span></div>` : ''}
                            ${bp.starter_instances != null ? `<div class="info-row"><span class="info-label">Conexões Starter</span><span class="info-value">${bp.starter_instances}</span></div>` : ''}
                            ${bp.pro_instances != null && bp.pro_instances > 0 ? `<div class="info-row"><span class="info-label">Conexões Pro</span><span class="info-value">${bp.pro_instances}</span></div>` : ''}
                            ${bp.subscription_status ? `<div class="info-row"><span class="info-label">Status</span><span class="info-value"><span class="status-badge ${statusClass(bp.subscription_status)}">${statusLabel(bp.subscription_status)}</span></span></div>` : ''}
                            ${bp.current_period_end ? `<div class="info-row"><span class="info-label">Próxima renovação</span><span class="info-value">${formatDate(bp.current_period_end)}</span></div>` : ''}
                            ${bp.subscription_type ? `<div class="info-row"><span class="info-label">Tipo</span><span class="info-value">${bp.subscription_type}</span></div>` : ''}
                        </div>
                    </div>
                `;
            }

            content.innerHTML = html;
        }

        // Init
        const emailParam = getEmail();
        if (emailParam) {
            loadProfile();
        } else {
            document.getElementById('searchSection').style.display = 'flex';
        }
    </script>
</body>
</html>
