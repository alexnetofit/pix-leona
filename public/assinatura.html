<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Assinatura - Leona</title>
    <link rel="icon" type="image/png" href="/logo-leona.png">
    <style>
        :root {
            --bg-primary: #0c0a12;
            --bg-secondary: #151120;
            --bg-card: #1e1830;
            --bg-elevated: #261f3a;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --accent-soft: rgba(139, 92, 246, 0.12);
            --orange: #f59e0b;
            --orange-hover: #d97706;
            --orange-soft: rgba(245, 158, 11, 0.12);
            --text-primary: #f0ecf7;
            --text-secondary: #9589ad;
            --text-muted: #6b5f82;
            --error: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --border: #2a2240;
            --border-light: #352d50;
            --glow-purple: rgba(139, 92, 246, 0.25);
            --glow-orange: rgba(245, 158, 11, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 400px;
            background: radial-gradient(ellipse at 50% -20%, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px 60px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-img {
            height: 64px;
            width: auto;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 20px var(--glow-purple));
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.25s ease;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--glow-purple);
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .btn-primary {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            white-space: nowrap;
            transition: all 0.25s ease;
            box-shadow: 0 2px 12px var(--glow-purple);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--accent-hover), var(--accent));
            box-shadow: 0 4px 20px var(--glow-purple);
            transform: translateY(-1px);
        }

        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-orange {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--orange), #fbbf24);
            color: #1a1005;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            white-space: nowrap;
            transition: all 0.25s ease;
            box-shadow: 0 2px 12px var(--glow-orange);
        }

        .btn-orange:hover {
            background: linear-gradient(135deg, var(--orange-hover), var(--orange));
            box-shadow: 0 4px 20px var(--glow-orange);
            transform: translateY(-1px);
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            backdrop-filter: blur(8px);
            transition: border-color 0.25s ease;
        }

        .card:hover { border-color: var(--border-light); }

        .card h3 {
            font-size: 1rem;
            margin-bottom: 16px;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .info-row:last-child { border-bottom: none; }

        .info-label { color: var(--text-secondary); }

        .info-value { font-weight: 600; text-align: right; }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .status-active { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .status-inactive { background: rgba(107, 95, 130, 0.2); color: var(--text-secondary); }
        .status-past_due { background: var(--orange-soft); color: var(--warning); }
        .status-canceled { background: rgba(239, 68, 68, 0.12); color: var(--error); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.7; }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 16px;
            color: var(--error);
            text-align: center;
            font-size: 0.9rem;
        }

        .alert {
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .alert-warning {
            background: var(--orange-soft);
            border: 1px solid rgba(245, 158, 11, 0.25);
            color: var(--orange);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: var(--error);
        }

        .alert-info {
            background: var(--accent-soft);
            border: 1px solid rgba(139, 92, 246, 0.2);
            color: #b49cfa;
        }

        .alert strong { display: block; margin-bottom: 6px; font-size: 1rem; }

        .offer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .offer-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 14px;
            transition: all 0.25s ease;
        }

        .offer-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--glow-purple);
        }

        .offer-card .offer-name { font-weight: 600; font-size: 0.95rem; }

        .offer-card .offer-value {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .offer-card .btn-copy {
            padding: 10px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            text-align: center;
            transition: all 0.25s ease;
        }

        .offer-card .btn-copy:hover { background: linear-gradient(135deg, var(--accent-hover), var(--accent)); }
        .offer-card .btn-copy.copied { background: var(--success); }

        .invoice-card {
            background: var(--bg-card);
            border: 1px solid rgba(245, 158, 11, 0.25);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 12px;
        }

        .sim-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px;
            margin-top: 16px;
        }

        .sim-panel input[type="number"]::-webkit-inner-spin-button,
        .sim-panel input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .sim-panel input[type="number"] {
            -moz-appearance: textfield;
        }

        .sim-result {
            margin-top: 14px;
            display: none;
        }

        a { color: var(--orange); }
        a:hover { color: var(--orange-hover); }

        .wpp-section { margin-top: 28px; }

        .wpp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 18px;
            background: #25d366;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.88rem;
            transition: all 0.25s ease;
            box-shadow: 0 3px 12px rgba(37, 211, 102, 0.25);
        }

        .wpp-btn:hover {
            background: #1ebe5a;
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.35);
            transform: translateY(-1px);
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .footer-logo {
            height: 28px;
            width: auto;
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        .footer-logo:hover { opacity: 0.7; }

        @media (max-width: 600px) {
            .container { padding: 20px 14px 36px; }
            .search-box { flex-direction: column; }
            .info-row { font-size: 0.82rem; padding: 8px 0; }
            .offer-grid { grid-template-columns: 1fr; }
            .logo-img { height: 44px; }
            .subtitle { font-size: 0.75rem; }
            header { margin-bottom: 24px; }
            .card { padding: 18px; border-radius: 12px; margin-bottom: 12px; }
            .card h3 { font-size: 0.9rem; margin-bottom: 12px; }
            .alert { padding: 14px; border-radius: 10px; margin-bottom: 12px; font-size: 0.83rem; }
            .alert strong { font-size: 0.9rem; }
            .sim-panel { padding: 16px; border-radius: 12px; margin-top: 12px; }
            .btn-primary, .btn-orange { padding: 11px 18px; font-size: 0.85rem; border-radius: 10px; }
            .status-badge { font-size: 0.68rem; padding: 3px 9px; }
            .wpp-section { margin-top: 20px; }
            .wpp-btn { padding: 11px 14px; font-size: 0.82rem; border-radius: 10px; gap: 7px; }
            .wpp-btn svg { width: 16px; height: 16px; }
            .footer { margin-top: 24px; padding-top: 16px; }
            .footer-logo { height: 20px; }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-overlay.open { display: flex; }
        .modal-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-card h3 {
            margin: 0 0 12px;
            color: var(--orange);
            font-size: 1.05rem;
        }
        .modal-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin: 8px 0;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .modal-actions button {
            flex: 1;
            min-width: 140px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .modal-actions button:hover { border-color: var(--accent); }
        .modal-actions button.danger {
            background: var(--orange);
            color: #fff;
            border-color: var(--orange);
        }
        .modal-actions button.danger:hover { filter: brightness(1.05); }
        .modal-actions button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="/logo-leona.png" alt="Leona" class="logo-img">
            <p class="subtitle">Minha Assinatura</p>
        </header>

        <div id="searchSection" class="search-box" style="display: none;">
            <input type="email" id="emailInput" placeholder="Digite seu e-mail" onkeydown="if(event.key==='Enter')loadProfile()">
            <button class="btn-primary" onclick="loadProfile()">Buscar</button>
        </div>

        <div id="content"></div>

        <div id="whatsappSection" class="wpp-section" style="display: none;">
            <a id="whatsappBtn" href="#" target="_blank" class="wpp-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                <span>Precisa de ajuda? Chame nosso suporte</span>
            </a>
        </div>

        <div class="footer">
            <img src="/logo-leona.png" alt="Leona" class="footer-logo">
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay" onclick="if(event.target===this)closeConfirmModal()">
        <div class="modal-card">
            <h3 id="confirmModalTitle">Confirmar ação</h3>
            <div id="confirmModalBody"></div>
            <div class="modal-actions">
                <button onclick="closeConfirmModal()">Cancelar</button>
                <button id="confirmModalOk" class="danger" onclick="confirmModalConfirm()">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        let _data = null;
        let _email = '';

        function getEmail() {
            const params = new URLSearchParams(window.location.search);
            return (params.get('email') || '').trim().toLowerCase();
        }

        function getAccountIdParam() {
            const params = new URLSearchParams(window.location.search);
            const raw = (params.get('account_id') || '').trim();
            if (!raw) return null;
            const n = Number(raw);
            return Number.isFinite(n) && n > 0 ? n : null;
        }

        function getDisplayProfiles(data) {
            const leona = data?.leona || {};
            let profiles = leona.billing_profiles || (leona.billing_profile ? [leona.billing_profile] : []);

            const accountIdParam = getAccountIdParam();
            if (accountIdParam && profiles.length > 0) {
                const filtered = profiles.filter(p => Number(p.account_id) === accountIdParam);
                if (filtered.length > 0) {
                    profiles = filtered;
                }
            }

            if (profiles.length > 1) {
                profiles = [...profiles].sort((a, b) => {
                    const aActive = !isLeonaExpired(a) ? 0 : 1;
                    const bActive = !isLeonaExpired(b) ? 0 : 1;
                    if (aActive !== bActive) return aActive - bActive;
                    return (b.starter_instances || 0) - (a.starter_instances || 0);
                });
            }

            return profiles;
        }

        function formatDate(d) {
            if (!d) return '—';
            const date = new Date(d.includes('T') ? d : d + 'T00:00:00Z');
            return date.toLocaleDateString('pt-BR', { timeZone: 'UTC' });
        }

        function fmtCurrency(v) {
            if (v == null) return '—';
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        }

        function statusLabel(s) {
            const map = { active: 'Ativa', inactive: 'Inativa', past_due: 'Atrasada', canceled: 'Cancelada', trialing: 'Trial' };
            return map[s] || s || '—';
        }

        function statusClass(s) {
            if (s === 'active' || s === 'trialing') return 'status-active';
            if (s === 'past_due') return 'status-past_due';
            if (s === 'canceled') return 'status-canceled';
            return 'status-inactive';
        }

        function invoiceStatusLabel(s) {
            const map = { paid: 'Pago', pending: 'Pendente', waiting_payment: 'Aguardando pagamento', overdue: 'Em atraso', refunded: 'Reembolsado' };
            return map[s] || s;
        }

        function getOfferForQty(offers, qty) {
            if (!offers) return null;
            for (const o of offers) {
                const m = o.name.match(/(\d+)\s*conex/i);
                if (m && parseInt(m[1]) === qty) return o;
            }
            return null;
        }

        function calcProRata(currentValue, newValue, periodEndStr) {
            const now = new Date();
            const periodEnd = new Date(periodEndStr);
            const diffMs = periodEnd.getTime() - now.getTime();
            const diasRestantes = Math.max(0, Math.ceil(diffMs / 86400000));
            const diasNoCiclo = 30;
            const proRata = (newValue - currentValue) * diasRestantes / diasNoCiclo;
            return { proRata: Math.round(proRata * 100) / 100, diasRestantes, diasNoCiclo };
        }

        function adjustQty(idx, delta, currentQty) {
            const input = document.getElementById(`newQty-${idx}`);
            const val = parseInt(input.value) || 1;
            const newVal = Math.max(1, val + delta);
            input.value = newVal;
            updateQtyLabel(idx, currentQty);
        }

        function updateQtyLabel(idx, currentQty) {
            const input = document.getElementById(`newQty-${idx}`);
            const label = document.getElementById(`qtyLabel-${idx}`);
            const btn = document.getElementById(`simBtn-${idx}`);
            const newQty = parseInt(input.value) || 0;
            const diff = newQty - currentQty;

            if (diff === 0) {
                label.innerHTML = `<span style="color: var(--text-muted);">Igual ao plano atual</span>`;
                btn.disabled = true;
                btn.textContent = 'Calcular nova mensalidade';
            } else if (diff > 0) {
                label.innerHTML = `<span style="color: var(--success);">+${diff} conex${diff !== 1 ? 'ões' : 'ão'}</span><span style="color: var(--text-muted);"> · total: <strong style="color: var(--text-primary);">${newQty}</strong></span>`;
                btn.disabled = false;
                btn.textContent = `Calcular upgrade para ${newQty} conex${newQty !== 1 ? 'ões' : 'ão'}`;
            } else {
                const absDiff = Math.abs(diff);
                label.innerHTML = `<span style="color: var(--orange);">−${absDiff} conex${absDiff !== 1 ? 'ões' : 'ão'}</span><span style="color: var(--text-muted);"> · total: <strong style="color: var(--text-primary);">${newQty}</strong></span>`;
                btn.disabled = false;
                btn.textContent = `Calcular downgrade para ${newQty} conex${newQty !== 1 ? 'ões' : 'ão'}`;
            }
        }

        function showWhatsapp(email) {
            const section = document.getElementById('whatsappSection');
            const btn = document.getElementById('whatsappBtn');
            btn.href = 'https://leonaflow.com/leona-tube/suporte-whatsapp';
            section.style.display = 'block';
        }

        function isLeonaExpired(bp) {
            if (!bp.subscription_status || bp.subscription_status !== 'active') return true;
            if (bp.current_period_end && new Date(bp.current_period_end) <= new Date()) return true;
            return false;
        }

        function todayStrUTC() {
            return new Date().toISOString().split('T')[0];
        }

        function isGuruCycleStillValid(sub) {
            // cycle_end vem como YYYY-MM-DD da Guru. Comparar como string evita
            // problemas de fuso horario (Brasil -3 vs Guru em UTC).
            if (!sub.cycle_end) return false;
            return sub.cycle_end >= todayStrUTC();
        }

        function isGuruSubFresh(sub) {
            // Sub criada nos ultimos 10 minutos. Protege contra race condition
            // entre o pagamento e o webhook ativar a Leona.
            if (!sub.started_at) return false;
            const startedAt = typeof sub.started_at === 'number'
                ? sub.started_at * 1000
                : new Date(sub.started_at).getTime();
            if (!Number.isFinite(startedAt)) return false;
            return (Date.now() - startedAt) < 10 * 60 * 1000;
        }

        function hasGuruPendingInvoice(sub) {
            const inv = sub.current_invoice;
            if (!inv) return false;
            return inv.status === 'waiting_payment' || inv.status === 'pending';
        }

        function findStaleGuruSub(guru) {
            // Sub elegivel para o "Cenario 3" (auto-cancelamento por data
            // divergente). So vale para subs que esta active na Guru MAS:
            //   - ciclo atual ja venceu (cycle_end no passado)
            //   - nao tem fatura pendente para pagar (se tivesse, mostrariamos ela)
            //   - nao foi criada nos ultimos 10 minutos (anti race do webhook)
            if (!guru.found || !guru.subscriptions) return null;
            for (const sub of guru.subscriptions) {
                if (sub.status !== 'active') continue;
                if (isGuruCycleStillValid(sub)) continue;
                if (hasGuruPendingInvoice(sub)) continue;
                if (isGuruSubFresh(sub)) continue;
                return sub;
            }
            return null;
        }

        function findProcessingGuruSub(guru) {
            // Sub Guru ativa cuja cobranca foi aceita (sem fatura pendente) e
            // o ciclo ainda esta valido (ou foi criada agora). Nesse caso o
            // pagamento ja entrou e estamos so esperando o webhook ativar a
            // Leona. NAO cancelar.
            if (!guru.found || !guru.subscriptions) return null;
            for (const sub of guru.subscriptions) {
                if (sub.status !== 'active') continue;
                if (hasGuruPendingInvoice(sub)) continue;
                if (!isGuruCycleStillValid(sub) && !isGuruSubFresh(sub)) continue;
                return sub;
            }
            return null;
        }

        function findActiveValidGuruSub(guru) {
            // Sub Guru capaz de renovar automaticamente: status active e
            // ciclo atual ainda valido. Quando existe uma dessas, NAO
            // alertamos sobre renovacao.
            if (!guru.found || !guru.subscriptions) return null;
            for (const sub of guru.subscriptions) {
                if (sub.status === 'active' && isGuruCycleStillValid(sub)) return sub;
            }
            return null;
        }

        function daysUntilLeonaExpiry(bp) {
            if (!bp.current_period_end) return null;
            const end = new Date(bp.current_period_end);
            if (!Number.isFinite(end.getTime())) return null;
            const diffMs = end.getTime() - Date.now();
            return Math.ceil(diffMs / 86400000);
        }

        function needsRenewalAlert(bp, guru) {
            // Cenario 6: Leona ainda ativa, mas perto de vencer, e nao ha
            // sub Guru ativa-valida pra renovar automaticamente.
            //
            // So alertamos quando o cliente JA passou pela Guru no passado
            // (guru.subscriptions.length > 0). Isso evita falso positivo
            // pra clientes que assinam por outros gateways (ex: Paddle) —
            // pra eles, "sem Guru ativa" e estado normal e quem renova e
            // o gateway proprio.
            if (isLeonaExpired(bp)) return false;
            const days = daysUntilLeonaExpiry(bp);
            if (days === null || days > 5) return false;
            const hasGuruHistory = guru && guru.found && Array.isArray(guru.subscriptions) && guru.subscriptions.length > 0;
            if (!hasGuruHistory) return false;
            return findActiveValidGuruSub(guru) === null;
        }

                }

            qtys.sort((a, b) => a - b);
            if (qtys.length === 0) return '';
            const slotId = slot || 'g';
            // Se veio defaultQty (>0), usa como inicial — mesmo que nao exista
            // oferta exata pra ela. Aí o cliente ve "Plano indisponivel" e pode
            // ajustar com +/-. Caso contrario, comeca no menor plano disponivel.
            const initialQty = (Number.isFinite(defaultQty) && defaultQty > 0) ? defaultQty : qtys[0];
            const initialOffer = getOfferForQty(offers, initialQty);

            _qtySelStates[slotId] = { offers, email, accountId: accountId || null };

            return `

                            onfocus="this.style.borderColor='var(--accent)';this.style.boxShadow='0 0 0 3px var(--glow-purple)'"

                            oninput="qtySelUpdate('${slotId}')">

                    </div>
                    <div id="qtySelInfo-${slotId}" style="text-align: center; margin-top: 18px; min-height: 70px;">${renderQtySelInfo(initialOffer, initialQty)}</div>
                    <button class="btn-orange" id="qtySelBtn-${slotId}" style="width: 100%; padding: 14px; margin-top: 12px; font-size: 0.95rem;" ${initialOffer ? '' : 'disabled'} onclick="qtySelGoCheckout('${slotId}')">

        function qtySelAdjust(slot, delta) {
            const input = document.getElementById(`qtySel-${slot}`);
            if (!input) return;
            const val = parseInt(input.value) || 1;
            input.value = Math.max(1, val + delta);
            qtySelUpdate(slot);
        }

        function qtySelUpdate(slot) {
            const state = _qtySelStates[slot];
            if (!state) return;
            const input = document.getElementById(`qtySel-${slot}`);
            const info = document.getElementById(`qtySelInfo-${slot}`);
            const btn = document.getElementById(`qtySelBtn-${slot}`);
            if (!input || !info || !btn) return;
            const qty = parseInt(input.value) || 0;
            const offer = getOfferForQty(state.offers, qty);
            info.innerHTML = renderQtySelInfo(offer, qty);
            if (offer) {
                btn.disabled = false;
                btn.textContent = 'Assinar agora';
            } else {
                btn.disabled = true;
                btn.textContent = 'Plano indisponível';
            }
        }

        function qtySelGoCheckout(slot) {
            const state = _qtySelStates[slot];
            if (!state) return;
            const input = document.getElementById(`qtySel-${slot}`);
            const qty = parseInt(input.value) || 0;
            const offer = getOfferForQty(state.offers, qty);
            if (!offer || !offer.checkout_url) return;
            const params = [];
            if (state.email) params.push('email=' + encodeURIComponent(state.email));
            // src = account_id da Leona (quando existe), pra que o webhook-guru
            // saiba qual conta atualizar mesmo se o cliente comprar com email
            // diferente do cadastrado.
            if (state.accountId) params.push('src=' + encodeURIComponent(String(state.accountId)));
            const sep = offer.checkout_url.includes('?') ? '&' : '?';
            const url = offer.checkout_url + (params.length ? sep + params.join('&') : '');
            window.open(url, '_blank');
        }

        async function renderProfile(data, email) {
            const content = document.getElementById('content');
            const { leona, guru, offers } = data;

            const profiles = getDisplayProfiles(data);

            if (!leona.found || profiles.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <p>Não encontramos uma assinatura para <strong>${email}</strong>.</p>

                    ${renderQtySelector(offers, email, 'none')}

                return;

            // Cenário 3 (auto-correção silenciosa): a Leona aparece vencida
            // E existe uma sub Guru "stale" (active mas com ciclo no passado,
            // sem fatura pendente, e nao recem-criada). Esse e o caso real
            // de "data divergente" — a Guru esqueceu de cobrar/emitir nova
            // fatura. Nesse caso cancelamos a sub Guru e soltamos o vinculo
            // na Leona; o cliente vai escolher um novo plano e o webhook
            // re-vincula tudo na Leona automaticamente.
            //
            // IMPORTANTE: nao cancelamos quando a sub Guru ainda tem ciclo
            // valido (ciclo atual pago e em curso) ou foi criada nos ultimos
            // minutos — nesses casos o pagamento e legitimo e estamos so
            // esperando o webhook ativar a Leona. Ver Cenario 5 abaixo.
            const expiredProfile = profiles.find(p => isLeonaExpired(p));
            const staleGuruSub = findStaleGuruSub(guru);
            if (expiredProfile && staleGuruSub) {
                await fixGuruInconsistency(expiredProfile.account_id, staleGuruSub.id, email);
                try {
                    const accountIdParam = getAccountIdParam();
                    const refetchBody = {};
                    if (email) refetchBody.email = email;
                    if (accountIdParam) refetchBody.account_id = accountIdParam;
                    const res = await fetch('/api/guru-search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(refetchBody)
                    });
                    const fresh = await res.json();
                    if (res.ok) {
                        _data = fresh;
                        return renderProfile(fresh, email);
                    }
                } catch (_) {}
            }

            // Cenario 5: Leona vencida + Guru com pagamento valido em
            // processamento. Detectado depois do Cenario 3 para que o
            // cancelamento por data divergente tenha prioridade quando
            // realmente fizer sentido. Calculado uma vez aqui e reutilizado
            // no loop de profiles abaixo.
            const processingGuruSub = findProcessingGuruSub(guru);

            const hasGuruAny = guru.found && guru.subscriptions.length > 0;

            let html = '';

            for (let i = 0; i < profiles.length; i++) {
                const bp = profiles[i];
                const expired = isLeonaExpired(bp);

                html += renderProfileCard(bp, i, profiles.length);

                if (expired) {
                    if (processingGuruSub) {
                        // Cenario 5: pagamento Guru valido em processamento
                        // (ciclo atual em curso ou sub recem-criada). NAO
                        // mostrar seletor de plano — pediria ao cliente pra
                        // pagar de novo por algo que ja foi pago.
                        html += renderProcessingState(processingGuruSub);
                    } else if (hasGuruAny) {
                        // Cenário 2: Leona vencida + Guru vencida/cancelada
                        const invoicesHtml = renderOpenInvoices(guru.invoices);
                        if (invoicesHtml) {
                            html += invoicesHtml;
                        } else {
                            html += `
                                <div class="alert alert-error">
                                    <strong>Sua assinatura venceu</strong>
                                    Escolha um plano abaixo para renovar.
                                </div>
                            `;
                            html += renderQtySelector(offers, email, `exp${i}`, bp.account_id);
                        }
                    } else {
                        // Cenário 1: Leona vencida + sem Guru
                        html += `
                            <div class="alert alert-error">
                                <strong>Sua assinatura venceu</strong>
                                Escolha um plano abaixo para renovar.
                            </div>
                        `;
                        html += renderQtySelector(offers, email, `noguru${i}`, bp.account_id);
                    }
                } else {
                    // Cenário 4: Leona ativa — upgrade/downgrade
                    const pendingInvoice = findPendingInvoice(guru);
                    if (pendingInvoice) {
                        html += renderPendingInvoice(pendingInvoice);
                    }

                    if (needsRenewalAlert(bp, guru)) {
                        // Cenario 6: Leona ainda ativa, mas perto de vencer e
                        // sem renovacao Guru garantida (cliente teve sub Guru
                        // no passado mas nenhuma esta active+valida agora).
                        // Mostra alerta + seletor pre-preenchido com a qty
                        // atual em vez do upgrade panel — o seletor ja
                        // permite ajustar a qty pra cima ou pra baixo.
                        const days = daysUntilLeonaExpiry(bp);
                        html += renderRenewalAlert(bp, days);
                        html += renderQtySelector(offers, email, `renew${i}`, bp.account_id, bp.starter_instances || 0);
                    } else {
                        html += renderUpgradePanel(bp, i);
                    }
                }
            }

            content.innerHTML = html;
        }

            const modal = document.getElementById('confirmModal');

            document.getElementById('confirmModalBody').innerHTML = bodyHtml || '';
            const okBtn = document.getElementById('confirmModalOk');
            okBtn.textContent = okText || 'Confirmar';
            okBtn.disabled = false;
            _confirmModalAction = onConfirm || null;
            modal.classList.add('open');

        function closeConfirmModal() {
            const modal = document.getElementById('confirmModal');
            modal.classList.remove('open');
            _confirmModalAction = null;
        }

        async function confirmModalConfirm() {
            const okBtn = document.getElementById('confirmModalOk');
            const fn = _confirmModalAction;
            if (!fn) return closeConfirmModal();
            okBtn.disabled = true;
            okBtn.textContent = 'Processando...';
            try {
                await fn();
            } finally {
                closeConfirmModal();
            }
        }

                            ${leonaOk
                                ? `✓ Conta Leona sincronizada (${leonaSync.starter_instances} starter)`
                                : `⚠️ Guru atualizada, mas a Leona não sincronizou${leonaSync?.error ? ': ' + leonaSync.error : ''}. Entre em contato com o suporte.`}
                        </div>
                        <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 14px;">A mudança já está em vigor. Atualize a página para ver os novos valores.</p>
                    </div>
                `;
            } catch (err) {
                resultDiv.innerHTML = `<div class="alert alert-error">Erro: ${err.message}</div>`;
            }
        }

        // Init
        const emailParam = getEmail();
        const accountIdParamInit = getAccountIdParam();
        if (emailParam || accountIdParamInit) {
            loadProfile();
        } else {
            document.getElementById('searchSection').style.display = 'flex';
        }
    </script>
</body>
</html>
